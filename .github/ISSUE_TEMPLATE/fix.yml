name: '🐛 버그 수정'
description: '버그를 제보하고 수정합니다.'
labels: [fix]
title: '이슈 이름을 작성해주세요'
body:
  - type: textarea
    id: current
    attributes:
      label: '🚨 현재 동작'
      description: '현재 어떤 문제가 발생하는지 설명해주세요.'
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: '✅ 기대 동작'
      description: '정상적으로 동작해야 하는 모습을 설명해주세요.'
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: '🔄 재현 방법'
      description: '버그를 재현하는 단계를 작성해주세요.'
      value: |
        1.
        2.
        3.
    validations:
      required: false
  - type: textarea
    id: reference
    attributes:
      label: '🔗 참고 사항'
      description: '스크린샷, 에러 로그 등을 첨부해주세요.'
    validations:
      required: false
