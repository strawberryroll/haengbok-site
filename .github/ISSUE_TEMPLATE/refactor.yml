name: '♻️ 리팩토링'
description: '기존 코드를 개선합니다.'
labels: [refactor]
title: '이슈 이름을 작성해주세요'
body:
  - type: textarea
    id: current
    attributes:
      label: '🚨 현재 문제'
      description: '현재 코드의 어떤 부분이 문제인지 설명해주세요.'
    validations:
      required: true
  - type: textarea
    id: improvement
    attributes:
      label: '💡 개선 방향'
      description: '어떻게 개선할 것인지 설명해주세요.'
    validations:
      required: true
  - type: textarea
    id: tasks
    attributes:
      label: '📋 작업 목록'
      description: '리팩토링에 필요한 세부 작업을 작성해주세요.'
      value: |
        - [ ]
    validations:
      required: false
